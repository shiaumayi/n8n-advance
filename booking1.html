<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: #333333;
            font-size: 24px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            color: #ffffff;
        }

        /* Sync Button (n8n) */
        .btn-sync {
            background-color: #ff6c37;
        }
        .btn-sync:hover {
            background-color: #e55a2b;
        }

        /* Settings Button (Google Sheets) */
        .btn-settings {
            background-color: #107c41;
        }
        .btn-settings:hover {
            background-color: #0c5e31;
        }

        /* Test Button (GitHub Pages) */
        .btn-test {
            background-color: #24292e;
        }
        .btn-test:hover {
            background-color: #1a1e22;
        }

        /* Responsive Design for Tablets and Desktops */
        @media (min-width: 576px) {
            .button-group {
                flex-direction: row;
                justify-content: space-between;
            }
            .btn {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>功能選單</h1>
        <div class="button-group">
            <a href="https://shiaumayi.app.n8n.cloud/form-test/a888cd8b-6577-40c1-8eeb-d5ade462a3b7" target="_blank" class="btn btn-sync">同步</a>
            <a href="https://docs.google.com/spreadsheets/d/1qbCnr4OfGOW15es7WHNIlSdWV91DPwdBf_t0sqY9M8Y/edit?usp=sharing" target="_blank" class="btn btn-settings">設定</a>
            <a href="https://shiaumayi.github.io/n8n-advance/off_days_viewer.htmll" target="_blank" class="btn btn-test">測試</a>
        </div>
    </div>

</body>
</html>
